services:
  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: skud_api
    restart: unless-stopped
    command: uvicorn api.app:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - skud_data:/data
      - skud_storage:/app/storage
    environment:
      SKUD_API_DB_PATH: /data/skud_api.db
      SKUD_STORAGE_DIR: /app/storage
      SKUD_BOOTSTRAP_TOKEN: ${SKUD_BOOTSTRAP_TOKEN}
      SKUD_QR_SECRET: ${SKUD_QR_SECRET}
      SKUD_UNLOCK_SECONDS: ${SKUD_UNLOCK_SECONDS:-5}

volumes:
  skud_data:
  skud_storage:
